<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>AppleMusic 风格歌词录制页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/main.css" />
</head>

<body>
  <div class="app" id="app">
    <div class="bg"></div>
    <div class="ambient"></div>
    <div class="grain"></div>

    <div class="floating-tools">
      <button class="mini-btn" id="togglePanelBtn" type="button">面板</button>
      <button class="mini-btn" id="toggleRecordingBtn" type="button">录制模式</button>
      <div class="badge" id="shortcutsBadge">空格 播放 / 暂停 · R 录制模式 · H 隐藏面板</div>
    </div>

    <dialog class="controls-panel" id="panel" open>
      <div class="panel-head">
        <div class="panel-title" id="panelTitle">录制控制台</div>
        <div class="panel-actions">
          <button class="mini-btn" id="loadDemoBtn" type="button">加载示例</button>
          <button class="mini-btn" id="resetViewBtn" type="button">回到开头</button>
        </div>
      </div>

      <div class="grid">
        <div class="row2">
          <div class="field">
            <label for="titleInput" id="songTitleLabel">歌名</label>
            <input type="text" id="titleInput" value="你的翻唱作品" />
          </div>
          <div class="field">
            <label for="artistInput" id="artistLabel">歌手 / 署名</label>
            <input type="text" id="artistInput" value="你的名字 / 原唱信息" />
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="coverInput" id="coverLabel">封面</label>
            <label class="file-label" for="coverInput" id="coverPickerLabel">选择封面图片</label>
            <input id="coverInput" type="file" accept="image/*" hidden />
          </div>
          <div class="field">
            <label for="audioInput" id="audioLabel">音频</label>
            <label class="file-label" for="audioInput" id="audioPickerLabel">选择音频文件</label>
            <input id="audioInput" type="file" accept="audio/*" hidden />
          </div>
        </div>

        <div class="field">
          <label for="lrcInput" id="lrcLabel">LRC 歌词</label>
          <textarea id="lrcInput" placeholder="粘贴 .lrc 内容，例如：&#10;[00:00.00]你的翻唱标题&#10;[00:12.30]第一句歌词"></textarea>
        </div>

        <div class="field calibration-card">
          <div class="field-header">
            <label for="lrcOffsetInput" id="lrcCalibrationLabel">歌词校准</label>
            <div class="value-pill" id="lrcOffsetValue">0 ms</div>
          </div>
          <div class="hint" id="lrcCalibrationHint">
            整首都快或慢一点时，用整体偏移；从某一句开始偏时，先播放到那句，再点“从当前句起对齐”。
          </div>
          <div class="field calibration-slider">
            <label for="lrcOffsetInput" id="lrcOffsetLabel">整体偏移</label>
            <input type="range" id="lrcOffsetInput" min="-5000" max="5000" step="10" value="0" />
          </div>
          <div class="calibration-actions">
            <button class="mini-btn" id="nudgeLrcBackBtn" type="button">整体 -100 ms</button>
            <button class="mini-btn" id="nudgeLrcForwardBtn" type="button">整体 +100 ms</button>
            <button class="mini-btn" id="alignCurrentLyricBtn" type="button">从当前句起对齐</button>
            <button class="mini-btn" id="resetLrcCalibrationBtn" type="button">重置校准</button>
          </div>
          <div class="hint calibration-status" id="lrcCalibrationStatus">
            当前 LRC 没有可校准的时间标签。
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="fontScaleInput" id="fontScaleLabel">歌词字号</label>
            <input type="range" id="fontScaleInput" min="80" max="140" value="100" />
          </div>
          <div class="field">
            <label for="coverScaleInput" id="coverScaleLabel">封面尺寸</label>
            <input type="range" id="coverScaleInput" min="26" max="42" value="35" />
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="bgDarknessInput" id="bgDarknessLabel">背景深浅</label>
            <input type="range" id="bgDarknessInput" min="30" max="100" value="72" />
          </div>
          <div class="field">
            <label for="bgBlurInput" id="bgBlurLabel">模糊强度</label>
            <input type="range" id="bgBlurInput" min="20" max="150" value="80" />
          </div>
        </div>

        <div class="field">
          <label class="checkbox-label">
            <input type="checkbox" id="bgAnimateInput" />
            <span id="bgAnimateLabel">动态背景呼吸效果</span>
          </label>
        </div>

        <button class="btn primary" id="playBtn" type="button" style="width: 100%;">播放 / 暂停</button>

        <button class="btn" id="exportVideoBtn" type="button"
          style="background: linear-gradient(135deg, rgba(255, 90, 90, 0.95), rgba(255, 120, 120, 0.84)); color: #fff; font-weight: 800;">●
          [BETA]导出视频（保留原音频）</button>

        <div class="hint export-status" id="exportStatus" aria-live="polite">
          首次导出会联网加载封装内核；如果你是直接双击打开 index.html，请改用任意本地 HTTP 服务打开后再导出。
        </div>

        <div class="hint" id="workflowHint">
          提示：也可以使用传统工作流，切到录制模式后使用 OBS 直接采集此网页。
        </div>
      </div>
    </dialog>

    <main class="shell">
      <section class="left">
        <div class="cover-wrap">
          <div class="cover-glow"></div>
          <img class="cover" id="cover" alt="歌曲封面" />
        </div>

        <div class="meta">
          <div class="eyebrow">Now Playing</div>
          <h1 class="title" id="title">你的翻唱作品</h1>
          <div class="artist" id="artist">你的名字 / 原唱信息</div>
        </div>
      </section>

      <section class="right">
        <div class="lyrics-focus-line"></div>
        <div class="lyrics-viewport" id="lyricsViewport">
          <div class="lyrics-track" id="lyricsTrack"></div>
        </div>
      </section>
    </main>

    <div class="bottom">
      <div class="time" id="currentTime">00:00</div>
      <input class="progress" id="progress" type="range" min="0" max="1000" step="1" value="0" aria-label="歌曲进度" />
      <div class="time" id="duration">00:00</div>
    </div>

    <audio id="audio"></audio>
  </div>

  <script>
    if (location.protocol === 'file:') {
      document.body.textContent = '';
      var msg = document.createElement('p');
      msg.style.cssText = 'max-width:480px;margin:15vh auto;padding:32px;font:16px/1.8 system-ui,sans-serif;color:#e8e8e8;background:#1a1a1a;border-radius:12px;text-align:center;';
      msg.innerHTML = '<strong style="font-size:20px;display:block;margin-bottom:12px;">&#9888; 请通过 HTTP 服务打开</strong>本项目使用 ES 模块，无法通过直接双击 index.html 运行。<br><br>请使用任意本地 HTTP 服务，例如：<br><code style="background:#333;padding:2px 8px;border-radius:4px;">python -m http.server 8000</code><br>然后访问 <code style="background:#333;padding:2px 8px;border-radius:4px;">http://127.0.0.1:8000</code>';
      document.body.appendChild(msg);
      throw new Error('file:// protocol is not supported');
    }
  </script>
  <script src="./vendor/ffmpeg/ffmpeg.js"></script>
  <script type="module" src="./scripts/app.js"></script>
</body>

</html>
