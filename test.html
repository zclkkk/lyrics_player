<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YesPlayMusic 风格歌词录制页</title>
  <link rel="stylesheet" href="./styles/main.css" />
  
  <style>
  
    .bg {
      /* 将背景放大至 120%，防止模糊时边缘漏出底色 */
      position: absolute;
      top: -10%; 
      left: -10%; 
      width: 120%; 
      height: 120%;
      z-index: -2;
      /* 添加动态呼吸动画 */
      animation: dynamicBlur 12s ease-in-out infinite alternate;
      /* 确保如果你的 JS 提取了封面颜色，颜色的切换也是平滑的 */
      transition: background-color 0.8s ease;
    }

    /* 关键帧：控制模糊度、饱和度、亮度和轻微的缩放 */
    @keyframes dynamicBlur {
      0% {
        filter: blur(60px) saturate(120%) brightness(0.8);
        transform: scale(1);
      }
      50% {
        filter: blur(90px) saturate(160%) brightness(1);
        transform: scale(1.05);
      }
      100% {
        filter: blur(50px) saturate(130%) brightness(0.9);
        transform: scale(1.02);
      }
    }

  
    .shell .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start; /* 采用左对齐，视觉重心更稳 */
      padding: 0 4vw;
    }

    .cover-wrap {
      position: relative;
      width: 100%;
      max-width: 420px; /* 限制最大尺寸，防止在大屏上过大 */
      margin-bottom: 24px;
      border-radius: 16px;
      /* 增加多层阴影提升质感 */
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.25),
        0 5px 15px rgba(0, 0, 0, 0.1);
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    /* 悬浮时的微动效，增加录制或截图时的交互感 */
    .cover-wrap:hover {
      transform: translateY(-8px) scale(1.02);
    }

    .cover {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1; /* 锁定 1:1 比例 */
      border-radius: 16px;
      object-fit: cover;
    }

    /* 优化发光层（如有），使其更像真实的光源漫反射 */
    .cover-glow {
      position: absolute;
      top: 10%; 
      left: 5%;
      width: 90%; 
      height: 90%;
      background: inherit;
      filter: blur(35px);
      z-index: -1;
      opacity: 0.6;
    }

    .meta {
      width: 100%;
      max-width: 420px;
    }

    .meta .eyebrow {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    .meta .title {
      font-size: clamp(2rem, 4vw, 3rem); /* 响应式字号 */
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 8px 0;
      /* 长标题自动截断，防止破坏布局 */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta .artist {
      font-size: 1.25rem;
      font-weight: 500;
      opacity: 0.85;
      margin-bottom: 16px;
    }

    .meta .subline {
      font-size: 0.9rem;
      opacity: 0.6;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meta .subline .dot {
      width: 4px; 
      height: 4px;
      border-radius: 50%;
      background: currentColor;
    }
  </style>
</head>
  
<body>
  <div class="app" id="app">
    <div class="bg"></div>
    <div class="grain"></div>

    <div class="floating-tools">
      <button class="mini-btn" id="togglePanelBtn" type="button">面板</button>
      <button class="mini-btn" id="toggleRecordingBtn" type="button">录制模式</button>
      <div class="badge" id="shortcutsBadge">空格 播放 / 暂停 · R 录制模式 · H 隐藏面板</div>
    </div>

    <aside class="controls-panel" id="panel">
      <div class="panel-head">
        <div class="panel-title" id="panelTitle">录制控制台</div>
        <div class="panel-actions">
          <button class="mini-btn" id="loadDemoBtn" type="button">加载示例</button>
          <button class="mini-btn" id="resetViewBtn" type="button">回到开头</button>
        </div>
      </div>

      <div class="grid">
        <div class="row2">
          <div class="field">
            <label for="titleInput" id="songTitleLabel">歌名</label>
            <input type="text" id="titleInput" value="你的翻唱作品" />
          </div>
          <div class="field">
            <label for="artistInput" id="artistLabel">歌手 / 署名</label>
            <input type="text" id="artistInput" value="你的名字 / 原唱信息" />
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="coverInput" id="coverLabel">封面</label>
            <label class="file-label" for="coverInput" id="coverPickerLabel">选择封面图片</label>
            <input class="hidden-input" id="coverInput" type="file" accept="image/*" />
          </div>
          <div class="field">
            <label for="audioInput" id="audioLabel">音频</label>
            <label class="file-label" for="audioInput" id="audioPickerLabel">选择音频文件</label>
            <input class="hidden-input" id="audioInput" type="file" accept="audio/*" />
          </div>
        </div>

        <div class="field">
          <label for="lrcInput" id="lrcLabel">LRC 歌词</label>
          <textarea id="lrcInput" placeholder="粘贴 .lrc 内容，例如：&#10;[00:00.00]你的翻唱标题&#10;[00:12.30]第一句歌词"></textarea>
        </div>

        <div class="row2">
          <div class="field">
            <label for="fontScaleInput" id="fontScaleLabel">歌词字号</label>
            <input type="range" id="fontScaleInput" min="80" max="140" value="100" />
          </div>
          <div class="field">
            <label for="coverScaleInput" id="coverScaleLabel">封面尺寸</label>
            <input type="range" id="coverScaleInput" min="26" max="42" value="35" />
          </div>
        </div>

        <div class="row2">
          <button class="btn primary" id="playBtn" type="button">播放 / 暂停</button>
          <button class="btn" id="recalcColorBtn" type="button">重新取色</button>
        </div>

        <div class="hint" id="workflowHint">
          建议工作流：导入封面、音频、LRC，点播放后切到录制模式，再用 OBS 或系统录屏采集这个页面。拖动底部进度条可以定位到任意时间。
        </div>
      </div>

      <div class="empty-state show" id="emptyState">
        <span id="emptyStateLine1">导入音频与 LRC 后开始播放。</span><br />
        <span id="emptyStateLine2">如果只想做静态镜头，也可以只导入封面和歌词。</span>
      </div>
    </aside>

    <main class="shell">
      <section class="left">
        <div class="cover-wrap">
          <div class="cover-glow"></div>
          <img class="cover" id="cover" alt="歌曲封面" />
        </div>

        <div class="meta">
          <div class="eyebrow">Now Playing</div>
          <h1 class="title" id="title">你的翻唱作品</h1>
          <div class="artist" id="artist">你的名字 / 原唱信息</div>
          <div class="subline">
            <span id="sublinePrimary">翻唱投稿可视化页面</span>
            <span class="dot"></span>
            <span id="sublineSecondary">模糊背景 · 自动取色 · 歌词同步</span>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="lyrics-focus-line"></div>
        <div class="lyrics-track" id="lyricsTrack"></div>
      </section>
    </main>

    <div class="bottom">
      <div class="time" id="currentTime">00:00</div>
      <input class="progress" id="progress" type="range" min="0" max="1000" step="1" value="0" aria-label="歌曲进度" />
      <div class="time" id="duration">00:00</div>
    </div>

    <audio id="audio"></audio>
  </div>

  <script src="./scripts/app.js" defer></script>
</body>

</html>
